name: MLflow CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas numpy joblib

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=file:./mlruns" >> $GITHUB_ENV

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run
        run: |
          cd MLProject
          # Mencari spesifik folder yang namanya terdiri dari 32 karakter (format asli Run ID)
          RUN_ID=$(ls -t mlruns/0/ | grep -E '^[a-f0-9]{32}$' | head -n 1)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest run: $RUN_ID"

      - name: Install Python dependencies for upload
        run: pip install requests

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker \
            -m "runs:/${{ steps.get_run.outputs.run_id }}/model" \
            -n "diabetes-model"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag diabetes-model ${{ secrets.DOCKER_USERNAME }}/diabetes-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/diabetes-model:latest